<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Viña Las Perdices</title>
    <style>
        /* Estilos Base Premium */
        body {
            background-color: #f4f1ea; /* Crema suave */
            color: #333;
            font-family: 'Georgia', serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }
        
        /* Ajuste del Logo JPG */
        .logo-img {
            max-width: 220px; /* Tamaño ideal para móvil */
            height: auto;
            margin-bottom: 30px;
        }

        .loader-container {
            margin-bottom: 20px;
        }

        /* Spinner color Vino */
        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid rgba(114, 47, 55, 0.1);
            border-top: 4px solid #722F37; /* Merlot/Vino */
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        p {
            font-family: 'Helvetica', sans-serif;
            font-size: 0.95rem;
            color: #555;
            letter-spacing: 1px;
            margin-top: 10px;
        }

        #mensaje-error {
            color: #722F37;
            font-weight: bold;
            padding: 20px;
            display: none;
            max-width: 80%;
        }
    </style>
</head>
<body>

    <img src="logo.jpg" alt="Viña Las Perdices" class="logo-img">

    <div class="loader-container" id="loader">
        <div class="spinner"></div>
    </div>

    <p id="texto-estado">Conectando con la bodega...</p>
    <div id="mensaje-error"></div>

    <script>
        // --- CONFIGURACIÓN ---
        const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbyuYAsdJYhDcnPP2v4pMRQnZQAs7ziMbxfRoklaA9J2tYod1vd-moZ98W2ps7WiZ70NaA/exec";
        const SEGURIDAD_TOKEN = "5e884898da28047151d0e56f8dc6292773603d0d6aabbdd62a11ef721d1542d8";

        window.onload = function() {
            const params = new URLSearchParams(window.location.search);
            const k = params.get('k');

            if (!k) {
                mostrarError("Código QR no detectado.");
                return;
            }

            const urlFinal = `${WEB_APP_URL}?k=${encodeURIComponent(k)}&t=${SEGURIDAD_TOKEN}`;

            fetch(urlFinal)
                .then(response => response.text())
                .then(data => {
                    if (data.startsWith("http")) {
                        window.location.replace(data);
                    } else {
                        mostrarError(data);
                    }
                })
                .catch(error => {
                    mostrarError("Error de conexión. Intente nuevamente.");
                });
        };

        function mostrarError(msg) {
            document.getElementById('loader').style.display = 'none';
            document.getElementById('texto-estado').style.display = 'none';
            const divError = document.getElementById('mensaje-error');
            divError.style.display = 'block';
            divError.innerText = msg;
        }
    </script>
</body>
</html>
